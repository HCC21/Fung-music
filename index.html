<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>Fung Fung Music</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ============================
     🎵 登入畫面
============================ -->
<div id="login-screen" class="login-screen">
    <h1>🎵 Fung Fung Music</h1>

    <input id="username-input" type="text" placeholder="名字">
    <input id="password-input" type="password" placeholder="密碼">

    <button id="login-btn">登入</button>

    <!-- 管理員密碼（已自動隱藏） -->
    <input id="admin-password" type="password" placeholder="管理員密碼" style="display:none;">
    <button id="admin-btn" style="display:none;">管理員登入</button>
</div>

<!-- ============================
     🎉 歡迎彈窗
============================ -->
<div id="welcome-popup" class="welcome-popup">
    <div id="welcome-popup-text"></div>
</div>

<!-- ============================
     🎵 主介面
============================ -->
<div class="container">

    <!-- ============================
         📌 左邊 Sidebar
    ============================ -->
    <div class="sidebar">

        <h2 id="welcome-text">🎵 Fung Fung Music</h2>

        <button id="theme-toggle">🌙 深色模式</button>

        <h3>🔍 搜尋</h3>
        <input id="search" type="text" placeholder="搜尋歌曲">

        <h3>📂 分類</h3>
        <ul id="categories">
            <li data-cat="all">全部</li>
            <li data-cat="slow songs">慢歌</li>
            <li data-cat="female">女聲</li>
        </ul>

        <h3>👥 登入紀錄</h3>
        <ul id="login-history"></ul>

        <button id="logout-btn">登出</button>
    </div>

    <!-- ============================
         🎧 播放器區域
    ============================ -->
    <div class="player-area">

        <img id="cover" class="cover" src="covers/default.jpg">

        <h2 id="title">請選擇歌曲</h2>

        <audio id="audio"></audio>

        <input id="progress" type="range" min="0" max="100" value="0">

        <div class="time-box">
            <span id="current">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button id="prev">⏮️</button>
            <button id="play">▶️</button>
            <button id="next">⏭️</button>
            <button id="shuffle">🔀</button>
            <button id="repeat">🔁</button>
        </div>

        <h3>🎵 播放清單</h3>
        <ul id="playlist"></ul>
    </div>
</div>

<!-- ============================
     🛠 管理員後台
============================ -->
<div id="admin-panel" class="admin-panel">

    <button id="admin-close" class="close-btn">❌</button>

    <h2>管理員後台</h2>

    <h3>👥 用戶列表</h3>
    <ul id="admin-user-list"></ul>

    <h3>➕ 新增用戶</h3>
    <input id="new-user-name" type="text" placeholder="名字">
    <input id="new-user-pass" type="text" placeholder="3 位數密碼">
    <button id="add-user-btn">新增</button>

    <h3>📌 登入紀錄（全部）</h3>
    <ul id="admin-history-list"></ul>

    <h3>🎧 播放紀錄（全部）</h3>
    <ul id="admin-play-history"></ul>

</div>

<!-- ============================
     📜 Script
============================ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="songsData.js"></script>
<script src="script.js"></script>

</body>
</html>
