<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fung Fung Music</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎵 登入畫面 -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h1>🎵 Fung Fung Music</h1>
    <p>朋友請登入</p>
    <input type="text" id="username-input" placeholder="名字">
    <input type="password" id="password-input" placeholder="密碼">
    <button id="login-btn">登入</button>
  </div>
</div>

<!-- 🎉 登入後歡迎提示 -->
<div id="welcome-popup" class="welcome-popup">
  <div class="welcome-box">
    <h2 id="welcome-popup-text"></h2>
    <p>祝你聽歌愉快！</p>
  </div>
</div>

<!-- 🎛️ 管理員密碼輸入框 -->
<input type="password" id="admin-password" placeholder="管理員密碼" style="display:none;">
<button id="admin-btn" style="display:none;">開啟管理員後台</button>

<!-- 🎛️ 管理員後台頁面 -->
<div id="admin-panel" class="admin-panel" style="display:none;">
  <h2>管理員後台</h2>

  <h3>允許登入的用戶（白名單）</h3>
  <ul id="admin-user-list"></ul>

  <h3>所有登入紀錄</h3>
  <ul id="admin-history-list"></ul>

  <h3>新增朋友帳號</h3>
  <input type="text" id="new-user-name" placeholder="名字">
  <input type="password" id="new-user-pass" placeholder="密碼（3位數字）">
  <button id="add-user-btn">新增帳號</button>

  <button id="admin-close">關閉管理員頁面</button>
</div>

<!-- 🎵 主頁內容 -->
<div class="container">
  <div class="sidebar">
    <h2 id="welcome-text">🎵 Fung Fung Music</h2>

    <input type="text" id="search" placeholder="搜尋歌曲..." class="search-box">

   

<h3>分類 Categories</h3>
<select id="categories-select">
  <option value="all">全部歌曲</option>
  <option value="slow songs">慢歌</option>
  <option value="fast songs">快歌</option>
  <option value="female">女歌男唱</option>
  <option value="kids">兒歌/卡通</option>
  <option value="opera">粵曲</option>
  <option value="festival">節日</option>
  <option value="other">其他</option>
</select>

 <h3>主題 Theme</h3>
    <select id="theme-select">
      <option value="theme-default">預設</option>
      <option value="theme-sakura">櫻花模式</option>
      <option value="theme-tech">科技模式</option>
      <option value="theme-cartoon">卡通模式</option>
      <option value="theme-light">亮色模式</option>
      <option value="theme-dark">深色模式</option>
    </select>

<h3>🎮 小遊戲 Game Center</h3>
<select id="game-select">
  <option value="">選擇遊戲</option>
  <option value="sakura">🌸 櫻花接花</option>
  <option value="cartoon">🎨 卡通跳跳樂</option>
</select>


    <h3>曾經登入過的朋友</h3>
    <ul id="login-history"></ul>

    <!-- ⭐ 管理員通知紅點 -->
    <div id="admin-notice" style="
      display:none;
      width:12px;
      height:12px;
      background:red;
      border-radius:50%;
      margin:10px 0;
    "></div>

    <button id="logout-btn" class="logout-btn">登出</button>
  </div>

  <div class="player-area">
    <div class="cd-wrapper">
      <img id="cover" src="covers/default.jpg" class="cd">
    </div>

    <h2 id="title">選擇一首歌播放</h2>
    <audio id="audio"></audio>

    <div class="progress-container">
      <span id="current">0:00</span>
      <input type="range" id="progress" value="0" min="0" max="100">
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button id="prev">⏮️</button>
      <button id="play" class="play-btn">▶️</button>
      <button id="next">⏭️</button>
    </div>

    <!-- ⭐ 留言區 -->
    <div id="comment-section" style="margin-top: 20px;">
      <h3>留言區</h3>

      <ul id="comment-list" style="list-style:none; padding:0; margin-bottom:10px;"></ul>

      <textarea id="comment-input" placeholder="寫下你的留言..." 
                style="width:100%; height:60px;"></textarea>
      <button id="comment-submit">送出留言</button>
    </div>

    <!-- ⭐ 播放清單（移到留言區下方） -->
    <div id="playlist-section" style="margin-top: 25px;">
      <h3>播放清單 Playlist</h3>
      <div id="playlist-buttons"></div>
    </div>

  </div>
</div>

<!-- 🎆 登入煙花 -->
<canvas id="fireworks"></canvas>

<!-- 🎮 小遊戲 Modal -->
<div id="game-modal" class="game-modal">
  <div class="game-box">
    <button id="game-close" class="game-close">✖</button>
    <canvas id="game-canvas"></canvas>
    <div id="game-ui"></div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js"></script>

<script src="songsData.js"></script>
<script src="script.js"></script>

</body>
</html>
